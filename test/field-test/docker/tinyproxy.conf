# Egress allowlist for the blind-agent container (Plan 35). Forwards ONLY to
# hosts matching /etc/tinyproxy/filter (api.anthropic.com); everything else is
# denied. CONNECT (HTTPS tunnels) restricted to :443.
User tinyproxy
Group tinyproxy
Port 8888
Listen 0.0.0.0
Timeout 600

# Clients are only the agent container on the private field-test network.
Allow 0.0.0.0/0

# The allowlist: deny by default, permit only filter-matched hosts, for both
# plain requests and CONNECT tunnels.
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive Off

# HTTPS only (Anthropic API is TLS on 443).
ConnectPort 443

LogLevel Warning
