name: Docs

on:
  push:
    branches: [main]
    paths: ["website/**", ".github/workflows/docs.yml"]
  pull_request:
    paths: ["website/**", ".github/workflows/docs.yml"]
  workflow_dispatch:

env:
  ASTRO_TELEMETRY_DISABLED: "1"

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run check:links
      - if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  # Deploys only from main. Requires Pages to be enabled on the repo
  # (Settings -> Pages -> Source: GitHub Actions) — available once the repo
  # is public (plans/OPEN-13).
  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
